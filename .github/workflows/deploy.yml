name: "📱 Sinergy App Continuous Deployment"

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: "Build & Push to ECR"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Next.js Production Build Test
        run: npx prisma generate && npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: sinergy-inventario
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Trigger App Runner Deployment
        run: |
          SERVICE=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='sinergy-inventario'].{Arn:ServiceArn,Status:Status}" \
            --output json | jq -r '.[0] // empty')

          if [ -z "$SERVICE" ]; then
            echo "ℹ️  App Runner service 'sinergy-inventario' no existe aún. Imagen en ECR lista — corre el workflow de IaC para crear el servicio."
            exit 0
          fi

          SERVICE_ARN=$(echo "$SERVICE" | jq -r '.Arn')
          SERVICE_STATUS=$(echo "$SERVICE" | jq -r '.Status')

          if [ "$SERVICE_STATUS" = "RUNNING" ]; then
            aws apprunner start-deployment --service-arn "$SERVICE_ARN"
            echo "✅ Deployment iniciado: $SERVICE_ARN"
          elif [ "$SERVICE_STATUS" = "CREATE_FAILED" ]; then
            echo "ℹ️  Servicio en CREATE_FAILED. Imagen en ECR lista — corre el workflow de IaC para recrearlo."
            exit 0
          else
            echo "⏳ Servicio en estado '$SERVICE_STATUS'. Imagen en ECR lista — vuelve a correr el deploy cuando esté RUNNING."
            exit 0
          fi